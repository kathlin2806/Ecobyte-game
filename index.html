<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        #mesa { 
            border: 3px dashed #333; 
            height: 200px; 
            width: 300px; 
            margin: 20px auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px;
        }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ECOBYTE</h1>
    <div id="placar">Impacto: 0 / 10</div>
    <div id="mesa"></div>

    <script>
        let score = 0;
        const placar = document.getElementById('placar');
        const mesa = document.getElementById('mesa');
        
        ["História", "Impacto", "Solução"].forEach(texto => {
            const btn = document.createElement('button');
            btn.innerText = texto;
            btn.onclick = () => {
                score += (texto === "Solução" ? -3 : 1);
                placar.innerText = "Impacto: " + Math.max(0, score) + " / 10";
            };
            mesa.appendChild(btn);
        });
    </script>
</body>
</html>
