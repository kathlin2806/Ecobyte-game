<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: sans-serif; background-color: #e8f5e9; text-align: center; padding: 20px; }
        h1 { color: #2e7d32; }
        
        /* A MESA */
        #mesa { 
            border: 3px dashed #2e7d32; 
            height: 200px; 
            width: 80%; 
            margin: 20px auto; 
            background-color: #ffffff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px;
        }
        
        /* AS CARTAS */
        .card { 
            padding: 20px; 
            background: #4caf50; 
            color: white; 
            cursor: pointer; 
            border-radius: 10px; 
            font-weight: bold; 
        }
        .card:hover { background: #388e3c; }
        .placar { font-size: 1.5em; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>
    <h1>ECOBYTE</h1>
    <div class="placar">Impacto: <span id="score">0</span> / 10</div>
    <div id="mesa"></div>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const mesa = document.getElementById('mesa');
        const cartas = ["História", "Impacto", "Solução"];
        
        cartas.forEach(nome => {
            const btn = document.createElement('div');
            btn.className = 'card';
            btn.innerText = nome;
            btn.onclick = () => {
                score = Math.max(0, score + (nome === "Solução" ? -3 : 1));
                scoreDisplay.innerText = score;
                if (score >= 10) alert("Limite atingido!");
            };
            mesa.appendChild(btn);
        });
    </script>
</body>
</html>
