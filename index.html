<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ECOBYTE</h1>
    <div id="placar">Impacto: 0 / 10</div>
    <div id="hand" style="margin-top: 20px;"></div>

    <script>
        let score = 0;
        const placar = document.getElementById('placar');
        const hand = document.getElementById('hand');
        const cartas = ["História", "Impacto", "Solução"];
        
        cartas.forEach(c => {
            const btn = document.createElement('button');
            btn.innerText = c;
            btn.onclick = () => {
                score += (c === "Solução" ? -3 : 1);
                placar.innerText = "Impacto: " + score + " / 10";
            };
            hand.appendChild(btn);
        });
    </script>
</body>
</html>
