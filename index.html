<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE - Desafio 21</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .logo { width: 150px; margin-bottom: 20px; }
        #mesa { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px auto; min-height: 250px; }

        .card { width: 150px; height: 200px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.revelada .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid #333; box-sizing: border-box; }
        .card-back { background-color: #1b5e20; display: flex; align-items: center; justify-content: center; }
        .card-back img { width: 80%; }
        .card-front { background: white; transform: rotateY(180deg); padding: 10px; border-top: 8px solid #ccc; }
        
        .azul { border-top-color: #1976d2; }
        .vermelho { border-top-color: #d32f2f; }
        .verde { border-top-color: #388e3c; }
        .amarelo { border-top-color: #fbc02d; }
    </style>
</head>
<body>

    <img src="logo.png" class="logo">
    <h1>Meta: Exatos 21 Pontos</h1>
    <div id="mesa"></div>
    <div style="font-size: 1.5em; font-weight: bold; margin: 10px;">Pontos: <span id="score">0</span></div>
    
    <button onclick="comprarCarta()" style="padding:15px 30px; cursor: pointer;">Comprar Carta</button>
    <button onclick="location.reload()" style="padding:15px 30px; cursor: pointer;">Reiniciar Jogo</button>

    <script>
        let score = 0;
        const deck = [
            { nome: "Tecnologia", cor: "azul", hist: "Inovação Digital (+5)", valor: 5 },
            { nome: "Impacto", cor: "vermelho", hist: "Descarte incorreto (-8)", valor: -8 },
            { nome: "Logística", cor: "verde", hist: "Reversa Sustentável (+5)", valor: 5 },
            { nome: "Ecoponto", cor: "amarelo", hist: "Reciclagem correta (+5)", valor: 5 }
        ];

        function comprarCarta() {
            const c = deck[Math.floor(Math.random() * deck.length)];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"><img src="logo.png"></div>
                    <div class="card-front ${c.cor}">
                        <h3>${c.nome}</h3><p style="font-size:0.8em">${c.hist}</p><b>${c.valor} pts</b>
                    </div>
                </div>
            `;
            
            div.onclick = function() {
                if(this.classList.contains('revelada')) return;
                this.classList.add('revelada');
                score += c.valor;
                document.getElementById('score').innerText = score;
                verificarFim();
            };
            document.getElementById('mesa').appendChild(div);
        }

        function verificarFim() {
            if (score <= -10) { 
                alert("Game Over! Você causou impacto negativo excessivo."); 
            } else if (score > 21) { 
                alert("Game Over! Você passou de 21 pontos (Estourou a meta)."); 
            } else if (score === 21) { 
                alert("Parabéns! Você alcançou o equilíbrio perfeito de 21 pontos!"); 
            }
        }
    </script>
</body>
</html>
