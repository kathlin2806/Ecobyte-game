<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .logo { width: 150px; margin-bottom: 20px; }
        #mesa { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px auto; min-height: 250px; }
        
        /* Estilo da carta */
        .card { width: 150px; height: 200px; background: #1b5e20; color: white; border-radius: 10px; 
                display: flex; flex-direction: column; justify-content: center; align-items: center; 
                cursor: pointer; border: 3px solid #000; transition: 0.3s; }
        
        /* Sem efeito de espelhamento */
        .revelada { background: white; color: black; border-top: 8px solid #ccc; }
        
        .azul { border-top-color: #1976d2; }
        .vermelho { border-top-color: #d32f2f; }
        .verde { border-top-color: #388e3c; }
        .amarelo { border-top-color: #fbc02d; }
    </style>
</head>
<body>

    <img src="logo.png" class="logo">
    <h1>Meta: 10 Pontos</h1>
    <div id="mesa"></div>
    <div style="font-size: 1.5em; font-weight: bold; margin: 10px;">Pontos: <span id="score">0</span></div>
    
    <button id="btnComprar" onclick="comprarCarta()" style="padding:15px 30px;">Comprar Carta</button>
    <button onclick="location.reload()" style="padding:15px 30px;">Reiniciar</button>

    <script>
        let score = 0;
        let cartCount = 0;
        const deck = [
            { nome: "Tecnologia", cor: "azul", hist: "Inovação Digital", valor: 5 },
            { nome: "Impacto", cor: "vermelho", hist: "Descarte incorreto", valor: -8 },
            { nome: "Logística", cor: "verde", hist: "Reversa Sustentável", valor: 5 },
            { nome: "Descarte", cor: "amarelo", hist: "Reciclagem correta", valor: 5 }
        ];

        function comprarCarta() {
            if (cartCount >= 5) return alert("Limite de 5 cartas atingido!");

            const c = deck[Math.floor(Math.random() * deck.length)];
            cartCount++;
            
            const div = document.createElement('div');
            div.className = `card revelada ${c.cor}`;
            div.innerHTML = `<h3>${c.nome}</h3><p style="font-size:0.8em">${c.hist}</p><b>${c.valor} pts</b>`;
            document.getElementById('mesa').appendChild(div);
            
            score += c.valor;
            document.getElementById('score').innerText = score;

            if (score <= -10) {
                alert("Game Over! Você atingiu 10 pontos negativos.");
                location.reload();
            } else if (score >= 10) {
                alert("Parabéns! Meta sustentável atingida!");
                location.reload();
            }
        }
    </script>
</body>
</html>
