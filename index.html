<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .logo-placeholder { font-size: 2em; font-weight: bold; color: #1b5e20; margin-bottom: 20px; }
        .placar { font-size: 1.8em; font-weight: bold; color: #1b5e20; margin-bottom: 20px; }
        #mesa { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        .card { width: 180px; background: white; border-radius: 15px; padding: 15px; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s; border-top: 8px solid #ccc; }
        .card:hover { transform: translateY(-10px); }
        /* Placeholder de imagem colorido */
        .img-placeholder { width: 100%; height: 100px; background-color: #ddd; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; color: #777; }
        
        .azul { border-top-color: #1976d2; }
        .vermelho { border-top-color: #d32f2f; }
        .verde { border-top-color: #388e3c; }
        .amarelo { border-top-color: #fbc02d; }
    </style>
</head>
<body>

    <div class="logo-placeholder">ECOBYTE</div>
    <div class="placar">Impacto: <span id="score">0</span></div>
    <div id="mesa"></div>

    <script>
        let score = 0;
        const mesa = document.getElementById('mesa');

        const baralho = [
            { nome: "Tecnologia", cor: "azul", hist: "ENIAC (1945): O primeiro computador pesava 30 toneladas.", valor: 5 },
            { nome: "Impacto", cor: "vermelho", hist: "Descarte incorreto contamina o solo com metais pesados.", valor: -3 },
            { nome: "Solução", cor: "verde", hist: "Logística Reversa: O retorno dos produtos ao ciclo produtivo.", valor: 5 },
            { nome: "Descarte", cor: "amarelo", hist: "Ecoponto: O local certo para a reciclagem segura.", valor: 5 }
        ];

        baralho.forEach(c => {
            const div = document.createElement('div');
            div.className = `card ${c.cor}`;
            div.innerHTML = `
                <div class="img-placeholder">${c.nome[0]}</div>
                <h3>${c.nome}</h3>
                <p style="font-size: 0.8em;">${c.hist}</p>
                <b>${c.valor} pts</b>
            `;
            div.onclick = () => { 
                score += c.valor; 
                document.getElementById('score').innerText = score;
                alert(c.nome + ": " + c.hist);
            };
            mesa.appendChild(div);
        });
    </script>
</body>
</html>
