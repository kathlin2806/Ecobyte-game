<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .logo { width: 200px; margin-bottom: 20px; }
        #mesa { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        
        .card { width: 180px; background: white; border-radius: 15px; padding: 15px; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s; border-top: 8px solid #ccc; }
        .card:hover { transform: translateY(-10px); }
        
        .azul { border-top-color: #1976d2; }
        .vermelho { border-top-color: #d32f2f; }
        .verde { border-top-color: #388e3c; }
        .amarelo { border-top-color: #fbc02d; }

        #resultado { display: none; margin-top: 20px; padding: 20px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

    <img src="logo.png" class="logo">
    <h1>Escolha suas ações</h1>
    <div id="mesa"></div>
    <button onclick="finalizarJogo()" style="padding: 10px 20px; font-size: 1.2em;">Finalizar Jogo</button>
    
    <div id="resultado"></div>

    <script>
        let escolhas = [];
        const baralho = [
            { nome: "Tecnologia", cor: "azul", hist: "ENIAC (1945): O primeiro computador pesava 30 toneladas.", valor: 5 },
            { nome: "Impacto", cor: "vermelho", hist: "Descarte incorreto contamina o solo com metais pesados.", valor: -8 },
            { nome: "Solução", cor: "verde", hist: "Logística Reversa: O retorno dos produtos ao ciclo produtivo.", valor: 5 },
            { nome: "Descarte", cor: "amarelo", hist: "Ecoponto: O local certo para a reciclagem segura.", valor: 5 }
        ];

        const mesa = document.getElementById('mesa');
        baralho.forEach(c => {
            const div = document.createElement('div');
            div.className = `card ${c.cor}`;
            div.innerHTML = `<h3>${c.nome}</h3><p style="font-size:0.8em">${c.hist}</p>`;
            div.onclick = () => {
                escolhas.push(c);
                alert("Carta " + c.nome + " adicionada!");
            };
            mesa.appendChild(div);
        });

        function finalizarJogo() {
            let total = 0;
            let html = "<h2>Resultado Final:</h2>";
            escolhas.forEach(c => {
                total += c.valor;
                html += `<p>${c.nome}: ${c.valor} pts</p>`;
            });
            html += `<h3>Total: ${total}</h3>`;
            
            if (total < 0) {
                html += "<h2 style='color:red'>VOCÊ PERDEU! O impacto foi negativo.</h2>";
            } else {
                html += "<h2 style='color:green'>PARABÉNS! Você salvou o ecossistema.</h2>";
            }
            
            document.getElementById('resultado').innerHTML = html;
            document.getElementById('resultado').style.display = 'block';
        }
    </script>
</body>
</html>
