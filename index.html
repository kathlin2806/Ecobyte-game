<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ECOBYTE</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        h1 { color: #1b5e20; }
        .placar { font-size: 1.6em; font-weight: bold; color: #2e7d32; margin-bottom: 30px; }
        
        #mesa { 
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; 
        }

        /* Estilo da Carta */
        .card { 
            width: 200px; background: white; border-radius: 15px; padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; cursor: pointer;
            border-top: 10px solid #ccc; transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .card h3 { margin: 10px 0; font-size: 1.1em; }
        .card p { font-size: 0.85em; color: #555; height: 40px; }
        .pontos { font-weight: bold; margin-top: 10px; font-size: 1.2em; }

        /* Cores por tipo */
        .azul { border-top-color: #1976d2; }
        .vermelho { border-top-color: #d32f2f; }
        .verde { border-top-color: #388e3c; }
        .amarelo { border-top-color: #fbc02d; }
    </style>
</head>
<body>

    <img src="logo.png" style="width: 200px;">
    <h1>ECOBYTE</h1>
    <div class="placar">Impacto: <span id="score">0</span></div>
    <div id="mesa"></div>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const mesa = document.getElementById('mesa');

        const baralho = [
            { nome: "Tecnologia", cor: "azul", img: "https://via.placeholder.com/200x120/1976d2/white?text=ENIAC", texto: "Primeiro computador de grande escala.", valor: 5 },
            { nome: "Impacto", cor: "vermelho", img: "https://via.placeholder.com/200x120/d32f2f/white?text=Solo", texto: "Metais pesados no solo.", valor: -3 },
            { nome: "Solução", cor: "verde", img: "https://via.placeholder.com/200x120/388e3c/white?text=Logistica", texto: "Logística reversa eficiente.", valor: 5 },
            { nome: "Descarte", cor: "amarelo", img: "https://via.placeholder.com/200x120/fbc02d/black?text=Ecoponto", texto: "Descarte correto de eletrônicos.", valor: 5 }
        ];

        baralho.forEach(c => {
            const card = document.createElement('div');
            card.className = `card ${c.cor}`;
            card.innerHTML = `
                <img src="${c.img}">
                <h3>${c.nome}</h3>
                <p>${c.texto}</p>
                <div class="pontos">${c.valor > 0 ? '+' : ''}${c.valor} pts</div>
            `;
            card.onclick = () => {
                score += c.valor;
                scoreDisplay.innerText = score;
            };
            mesa.appendChild(card);
        });
    </script>
</body>
</html>
